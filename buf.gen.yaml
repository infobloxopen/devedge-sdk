version: v2
# Root buf.gen.yaml: generates for authzpb test fixture only.
# The W3-4 toy module (testdata/toy/) has its own buf.gen.yaml that also
# runs protoc-gen-svc and protoc-gen-storage — keeping gorm.io/gorm out of
# devedge-sdk's go.mod (the toy has its own standalone go.mod with GORM).
inputs:
  - directory: authz/authzpb/internal/testpb
  - directory: internal/testpb/secretpb
plugins:
  - local: protoc-gen-go
    out: .
    opt: module=github.com/infobloxopen/devedge-sdk
  # Emits <Service>AuthzRules tables from (infoblox.authz.v1.rule) annotations.
  # Built to ./bin by `make generate`.
  - local: protoc-gen-devedge-authz
    out: .
    opt: module=github.com/infobloxopen/devedge-sdk
