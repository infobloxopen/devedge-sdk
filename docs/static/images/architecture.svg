<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="devedge-sdk three-layer architecture diagram">
  <defs>
    <style>
      .title  { font-size: 15px; font-weight: 700; }
      .owner  { font-size: 11px; fill: #6b7280; }
      .box    { font-size: 12.5px; }
      .layer1 { fill: #eef2ff; stroke: #6366f1; }
      .layer2 { fill: #ecfdf5; stroke: #10b981; }
      .layer3 { fill: #fff7ed; stroke: #f59e0b; }
      .inner  { fill: #ffffff; stroke: #cbd5e1; }
      .lbl    { fill: #111827; }
      .arrow  { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Layer 1: Contract -->
  <rect x="20" y="20" width="720" height="120" rx="10" class="layer1" stroke-width="2"/>
  <text x="40" y="48" class="title lbl">Layer 1 — Contract</text>
  <text x="700" y="48" class="owner" text-anchor="end">owned by the service team</text>
  <rect x="40" y="62" width="320" height="58" rx="7" class="inner"/>
  <text x="56" y="86" class="box lbl">.proto resources &amp; RPCs</text>
  <text x="56" y="106" class="box lbl">(infoblox.authz.v1.rule)</text>
  <rect x="380" y="62" width="340" height="58" rx="7" class="inner"/>
  <text x="396" y="86" class="box lbl">(infoblox.authz.v1.field).secret</text>
  <text x="396" y="106" class="box lbl">verb · resource · public</text>

  <!-- Layer 2: SDK runtime -->
  <rect x="20" y="180" width="720" height="180" rx="10" class="layer2" stroke-width="2"/>
  <text x="40" y="208" class="title lbl">Layer 2 — devedge-sdk runtime</text>
  <text x="700" y="208" class="owner" text-anchor="end">shared · imported by every service</text>
  <rect x="40" y="224" width="160" height="50" rx="7" class="inner"/>
  <text x="120" y="254" class="box lbl" text-anchor="middle">interceptor chain</text>
  <rect x="212" y="224" width="150" height="50" rx="7" class="inner"/>
  <text x="287" y="254" class="box lbl" text-anchor="middle">authz seam</text>
  <rect x="374" y="224" width="150" height="50" rx="7" class="inner"/>
  <text x="449" y="254" class="box lbl" text-anchor="middle">secret (Encryptor)</text>
  <rect x="536" y="224" width="184" height="50" rx="7" class="inner"/>
  <text x="628" y="254" class="box lbl" text-anchor="middle">persistence (seam)</text>
  <rect x="40" y="288" width="220" height="50" rx="7" class="inner"/>
  <text x="150" y="318" class="box lbl" text-anchor="middle">codegen: svc · storage · ent</text>
  <rect x="272" y="288" width="200" height="50" rx="7" class="inner"/>
  <text x="372" y="318" class="box lbl" text-anchor="middle">shapes: GORM · ent</text>
  <rect x="484" y="288" width="236" height="50" rx="7" class="inner"/>
  <text x="602" y="318" class="box lbl" text-anchor="middle">seccheck (CI assertions)</text>

  <!-- Layer 3: Backends -->
  <rect x="20" y="400" width="720" height="100" rx="10" class="layer3" stroke-width="2"/>
  <text x="40" y="428" class="title lbl">Layer 3 — Backends (pluggable)</text>
  <text x="700" y="428" class="owner" text-anchor="end">owned by platform / infra</text>
  <rect x="40" y="444" width="210" height="42" rx="7" class="inner"/>
  <text x="145" y="470" class="box lbl" text-anchor="middle">decision point (OPA / Cedar / PDP)</text>
  <rect x="262" y="444" width="180" height="42" rx="7" class="inner"/>
  <text x="352" y="470" class="box lbl" text-anchor="middle">Vault (Transit)</text>
  <rect x="454" y="444" width="266" height="42" rx="7" class="inner"/>
  <text x="587" y="470" class="box lbl" text-anchor="middle">database (Postgres) · migrations</text>

  <!-- Arrows -->
  <path class="arrow" d="M380 140 L380 180"/>
  <path class="arrow" d="M380 360 L380 400"/>
</svg>
