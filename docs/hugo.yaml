baseURL: https://infobloxopen.github.io/devedge-sdk/
languageCode: en-us
title: devedge-sdk

enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true

params:
  description: A modern Go service framework — proto annotations, fail-closed authz, secret-at-rest, dual storage shapes.
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: true
  theme:
    default: system
    displayToggle: true
  highlight:
    copy:
      enable: true
  editURL:
    enable: true
    base: https://github.com/infobloxopen/devedge-sdk/edit/main/docs/content

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Search
      weight: 2
      params:
        type: search
    - name: GitHub
      url: https://github.com/infobloxopen/devedge-sdk
      weight: 3
      params:
        icon: github
